apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: qa-ebs-sc
provisioner: ebs.csi.aws.com # EBS CSI 드라이버 사용
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer # 파드가 노드에 배정될 때까지 생성을 대기 (AZ 일치 위해 권장)
parameters:
  type: gp3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qa-ebs-claim
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: qa-ebs-sc
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: qa-ebs-app
spec:
  containers:
  - name: qa-ebs-app
    image: public.ecr.aws/amazonlinux/amazonlinux:2023
    command: ["/bin/sh"]
    args: ["-c", "while true; do echo $(date) >> /data/out.txt; sleep 5; done"]
    volumeMounts:
    - name: persistent-storage
      mountPath: /data
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: qa-ebs-claim