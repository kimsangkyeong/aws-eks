apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: eks-tb07297
  region: ap-northeast-2

managedNodeGroups:
  - name: management
    labels: { role: management }
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    subnets: [ subnet-03cea3f8ba88173ea, subnet-0a99c143eca28ec73 ]
    volumeSize: 100        # 파일용량 100 GiB
    disableIMDSv1: true    # IMDSv2 강제 적용
    privateNetworking: true
    tags:
      finops-start: skip
      finops-stop: skip    # EKS Cluster NodeGroup Tag 설정하기
    iam:
      instanceRoleARN: "arn:aws:iam::xxxxxxxxxxxx:role/tb07297-eks-nodegroup-role"  # EKS Cluster Node Group Role
    securityGroups:
      attachIDs: [ sg-0871b732e2357246e ]
    volumeType: gp3
